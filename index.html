<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 Data For You!</title>
    <script src="f1data.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
</head>
<header>
    <h1>F1 Data For You Baby!!</h1>
</header>
<body>
<div class="row">
    <div class="collum">
       <h2>Driver Standings</h2> 
       <table id="driver-standings">
            <tr>
                <th>Position</th>
                <th>Name</th>
                <th>Points</th>
            </tr>
        </table>
    </div>
    <div class="collum">
        <h2>Constructor Standings</h2>
        <table id="constructor-standings">
            <tr>
                <th>Position</th>
                <th>Team</th>
                <th>Points</th>
            </tr>
        </table>
    </div>
    <div class="collum"> 
        <h2>Oscar Piastri</h2>
       <table id="oscar-piastri">
            <tr>
                <th>Session</th>
                <th>Position</th>
                <th>Time</th>
            </tr>
        </table>
    </div>
</div>
<script>
    document.addEventListener('DOMContentLoaded', async () => {
        await getcons();
        await getdriv();
    });
</script>
</body>
</html>
